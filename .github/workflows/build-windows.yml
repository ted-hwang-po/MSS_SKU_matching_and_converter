name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:  # 수동 실행도 가능

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas openpyxl rapidfuzz pyinstaller tkinterdnd2

      - name: Verify tkinterdnd2 structure
        run: |
          python -c "
          import tkinterdnd2, os
          pkg_dir = os.path.dirname(tkinterdnd2.__file__)
          print(f'Package dir: {pkg_dir}')
          for root, dirs, files in os.walk(pkg_dir):
              level = root.replace(pkg_dir, '').count(os.sep)
              indent = '  ' * level
              print(f'{indent}{os.path.basename(root)}/')
              for f in files:
                  print(f'{indent}  {f}')
          "

      - name: Build EXE
        run: |
          pyinstaller app.py --onefile --windowed --name="SKU_변환기" --add-data="core;core" --additional-hooks-dir=. --hidden-import=openpyxl --hidden-import=pandas --hidden-import=rapidfuzz --hidden-import=tkinterdnd2 --hidden-import=core.ui_helpers --hidden-import=core.session

      - name: Verify EXE
        run: |
          dir dist
          echo "Build completed successfully"

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: SKU_변환기
          path: dist/SKU_변환기.exe
