name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:  # 수동 실행도 가능

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas openpyxl rapidfuzz pyinstaller

      - name: Build EXE
        run: |
          pyinstaller app.py --onefile --windowed --name="SKU_변환기" --add-data="core;core" --hidden-import=openpyxl --hidden-import=pandas --hidden-import=rapidfuzz

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: SKU_변환기
          path: dist/SKU_변환기.exe
