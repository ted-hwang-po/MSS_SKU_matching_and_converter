name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:  # 수동 실행도 가능

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas openpyxl rapidfuzz pyinstaller tkinterdnd2

      - name: Build EXE
        run: |
          # tkinterdnd2 DLL 경로를 찾아서 PyInstaller에 포함
          python -c "
          import tkinterdnd2
          import os
          dnd_path = os.path.dirname(tkinterdnd2.__file__)
          print(f'tkinterdnd2 path: {dnd_path}')

          # PyInstaller 실행
          import PyInstaller.__main__
          PyInstaller.__main__.run([
              'app.py',
              '--onefile',
              '--windowed',
              '--name=SKU_변환기',
              '--add-data=core;core',
              f'--add-data={dnd_path};tkinterdnd2',
              '--hidden-import=openpyxl',
              '--hidden-import=pandas',
              '--hidden-import=rapidfuzz',
              '--hidden-import=tkinterdnd2',
              '--hidden-import=core.ui_helpers',
              '--hidden-import=core.session',
          ])
          "

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: SKU_변환기
          path: dist/SKU_변환기.exe
